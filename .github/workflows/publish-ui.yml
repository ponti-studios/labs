name: publish-ui

on:
  push:
    tags:
      - "ui-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="$(node -p 'require("./packages/ui/package.json").version')"
          test "ui-v$VERSION" = "$GITHUB_REF_NAME"

      - name: Publish
        run: pnpm --filter @ponti-studios/ui publish --no-git-checks --force
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published package
        run: |
          VERSION="$(node -p 'require("./packages/ui/package.json").version')"
          test "$(npm view "@ponti-studios/ui@$VERSION" version --registry=https://registry.npmjs.org)" = "$VERSION"
