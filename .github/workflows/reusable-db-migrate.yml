name: reusable-db-migrate

on:
  workflow_call:
    secrets:
      DATABASE_URL:
        description: PostgreSQL connection string for the target database
        required: true

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.30.3

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: install-dependencies
        run: pnpm install --frozen-lockfile --filter @pontistudios/db...

      - name: run-migrations
        run: pnpm --filter @pontistudios/db db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NO_COLOR: "1"

      - name: debug-migration-state
        if: failure()
        run: |
          echo "=== labs.__drizzle_migrations ==="
          psql "$DATABASE_URL" -c "SELECT hash, created_at FROM labs.__drizzle_migrations ORDER BY created_at;" 2>&1 || echo "(table does not exist)"
          echo "=== All tables in labs schema ==="
          psql "$DATABASE_URL" -c "\dt labs.*" 2>&1
          echo "=== Duplicate puzzle dates (blocks unique game_id+date_utc) ==="
          psql "$DATABASE_URL" -c "
            SELECT date_utc, count(*) AS n
            FROM labs.rhobh_daily_puzzles
            GROUP BY date_utc
            HAVING count(*) > 1
            ORDER BY n DESC, date_utc;
          " 2>&1 || echo "(rhobh_daily_puzzles missing or already renamed)"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
