name: deploy-earth-prod

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-earth-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    uses: ./.github/workflows/reusable-db-migrate.yml
    secrets:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    needs: migrate
    uses: ./.github/workflows/reusable-railway-deploy.yml
    with:
      config_path: apps/earth/railway.json
      node-version: "24"
      railway-cli-version: "4.58.0"
      timeout-minutes: 10
    secrets:
      railway_token: ${{ secrets.RAILWAY_TOKEN }}
      railway_service: ${{ secrets.RAILWAY_SERVICE_EARTH }}
