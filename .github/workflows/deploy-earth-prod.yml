name: deploy-cartograph-prod

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cartograph-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Pin Railway CLI. Dependabot keeps this updated (.github/dependabot.yml).
    container: ghcr.io/railwayapp/cli:v4.58.0
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: validate-env
        run: test -n "$RAILWAY_TOKEN"

      - name: deploy-to-railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_EARTH_INTELLIGENCE }} --detach --ci
