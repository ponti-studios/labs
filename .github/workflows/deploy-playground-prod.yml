name: deploy-labyrinth-prod

on:
  push:
    branches: [main]
    paths:
      - "apps/labyrinth/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-playground-prod.yml"
      - ".github/workflows/reusable-railway-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-labyrinth-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: install-dependencies
        run: pnpm install --frozen-lockfile --filter @pontistudios/db...

      - name: create-labs-schema
        run: pnpm --filter @pontistudios/db db:create-schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: run-migrations
        run: pnpm --filter @pontistudios/db db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NO_COLOR: "1"

      - name: debug-migration-state
        if: failure()
        run: |
          psql "$DATABASE_URL" -c "SELECT hash, created_at FROM drizzle.__drizzle_migrations ORDER BY created_at;"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    needs: migrate
    uses: ./.github/workflows/reusable-railway-deploy.yml
    with:
      config_path: apps/labyrinth/railway.json
      node-version: "24"
      railway-cli-version: "4.58.0"
      timeout-minutes: 10
    secrets:
      railway_token: ${{ secrets.RAILWAY_TOKEN }}
      railway_service: ${{ secrets.RAILWAY_SERVICE_PLAYGROUND }}
