name: schedule-rhobh-daily-puzzle

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:
    inputs:
      date_utc:
        description: Optional UTC date to generate in YYYY-MM-DD format
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: resolve-date
        id: resolve-date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date_utc }}" ]; then
            echo "date_utc=${{ github.event.inputs.date_utc }}" >> "$GITHUB_OUTPUT"
          else
            echo "date_utc=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: trigger-rhobh-daily-generation
        env:
          LABYRINTH_BASE_URL: ${{ secrets.LABYRINTH_BASE_URL }}
          RHOBH_DAILY_PUZZLE_TOKEN: ${{ secrets.RHOBH_DAILY_PUZZLE_TOKEN }}
          DATE_UTC: ${{ steps.resolve-date.outputs.date_utc }}
        shell: bash
        run: |
          test -n "$LABYRINTH_BASE_URL"
          test -n "$RHOBH_DAILY_PUZZLE_TOKEN"
          test -n "$DATE_UTC"

          response_file="$(mktemp)"
          status_code="$(
            curl -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              -X POST "${LABYRINTH_BASE_URL%/}/api/games/wordle/rhobh/generate" \
              -H "Authorization: Bearer $RHOBH_DAILY_PUZZLE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"dateUtc\":\"$DATE_UTC\"}"
          )"

          cat "$response_file"

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo
            echo "RHOBH daily generation failed with HTTP $status_code" >&2
            exit 1
          fi
