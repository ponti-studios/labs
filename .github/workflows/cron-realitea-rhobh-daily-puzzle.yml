name: cron-realitea-rhobh-daily-puzzle

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:
    inputs:
      date_utc:
        description: Optional UTC date to generate in YYYY-MM-DD format
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          cache: "pnpm"

      - name: install-dependencies
        run: pnpm install --frozen-lockfile --filter @pontistudios/labyrinth...

      - name: resolve-date
        id: resolve-date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.date_utc }}" ]; then
            echo "date_utc=${{ github.event.inputs.date_utc }}" >> "$GITHUB_OUTPUT"
          else
            echo "date_utc=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: trigger-generation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DATE_UTC: ${{ steps.resolve-date.outputs.date_utc }}
        run: pnpm --filter @pontistudios/labyrinth realitea:generate-daily -- --date-utc="$DATE_UTC"
