name: cron-realitea-worlde-gen

on:
  schedule:
    # Daily at 5:00 PM UTC = 9:00 AM Pacific (DST-safe)
    - cron: "0 17 * * *"
  workflow_dispatch:
permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          cache: "pnpm"

      - name: install-dependencies
        run: pnpm install --frozen-lockfile --filter @pontistudios/labyrinth...

      - name: install-db-dependencies
        run: pnpm install --frozen-lockfile --filter @pontistudios/db...

      - name: run-db-migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @pontistudios/db db:migrate

      - name: ingest-feeds
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: pnpm --filter @pontistudios/labyrinth exec tsx scripts/realitea-ingest.ts

      - name: reconcile
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: pnpm --filter @pontistudios/labyrinth realitea:reconcile

      - name: health-check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @pontistudios/labyrinth exec tsx scripts/realitea-health-check.ts
