name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - run: npm run build
