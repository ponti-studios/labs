name: deploy-home-prod

on:
  push:
    branches: [main]
    paths:
      - 'apps/home/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-home-prod.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-home-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: install-railway-cli
        run: npm install -g @railway/cli@4.58.0

      - name: checkout-code
        uses: actions/checkout@v4

      - name: validate-env
        run: test -n "$RAILWAY_TOKEN"

      - name: deploy-to-railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_HOME }} --detach --ci
