name: publish-homebrew

on:
  push:
    tags:
      - "v*"  # e.g. v0.1.0

permissions:
  contents: write
  pull-requests: write

jobs:
  homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$(echo $VERSION | cut -d. -f1)" >> $GITHUB_OUTPUT
          echo "minor=$(echo $VERSION | cut -d. -f2)" >> $GITHUB_OUTPUT
          echo "patch=$(echo $VERSION | cut -d. -f3)" >> $GITHUB_OUTPUT

      - name: Download tarball
        run: |
          curl -sL "https://github.com/ponti-labs/labs-tools/archive/refs/tags/v${{ steps.version.outputs.version }}.tar.gz" \
            -o /tmp/labstools.tar.gz

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 /tmp/labstools.tar.gz | cut -d' ' -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Prepare formula patch
        run: |
          mkdir -p /tmp/homebrew-labs
          cat > /tmp/homebrew-labs/labstools.rb << 'FORMULA'
          class Labstools < Formula
            desc "Labs team CLI tools (token counter, etc.)"
            homepage "https://github.com/ponti-labs/labs-tools"
            url "https://github.com/ponti-labs/labs-tools/archive/refs/tags/v${{ steps.version.outputs.version }}"
            sha256 "${{ steps.sha.outputs.sha }}"
            license "MIT"
            head "https://github.com/ponti-labs/labs-tools.git", branch: "main"

            depends_on "python@3.13"

            def install
              system "python3.13", "-m", "pip", "install", "-e", ".", "--prefix=#{prefix}"
              bin.install_symlink "tiktoken-count"
            end

            def caveats
              <<~EOS
                Run: tiktoken-count <folder>
              EOS
            end

            test do
              (testpath/"example.md").write("# Hello\n\nToken counting test.")
              system bin/"tiktoken-count", testpath
            end
          end
          FORMULA

      - name: Create branch in homebrew-labs
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: /tmp/homebrew-labs
          commit-message: "labstools v${{ steps.version.outputs.version }}"
          branch: labstools-bump-v${{ steps.version.outputs.version }}
          title: "labstools v${{ steps.version.outputs.version }}"
          body: |
            ## labstools v${{ steps.version.outputs.version }}

            Updated [labstools](https://github.com/ponti-labs/labs-tools) to v${{ steps.version.outputs.version }}.

            **Changes:**
            - SHA256: \`${{ steps.sha.outputs.sha }}\`
            - Run `brew upgrade labstools` (or `brew install labstools` for first install)

            Merged by: ${{ github.actor }}
          base: main
          labels: |
            labstools
            homebrew
