name: release-ui

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs['packages/ui--release_created'] == 'true' }}

      - uses: pnpm/action-setup@v6
        if: ${{ steps.release.outputs['packages/ui--release_created'] == 'true' }}
        with:
          run_install: false

      - uses: actions/setup-node@v7
        if: ${{ steps.release.outputs['packages/ui--release_created'] == 'true' }}
        with:
          node-version: "24.14.1"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: ${{ steps.release.outputs['packages/ui--release_created'] == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Verify release tag
        if: ${{ steps.release.outputs['packages/ui--release_created'] == 'true' }}
        env:
          RELEASE_TAG: ${{ steps.release.outputs['packages/ui--tag_name'] }}
        run: |
          VERSION="$(node -p 'require("./packages/ui/package.json").version')"
          test "$RELEASE_TAG" = "ui-v$VERSION"

      - name: Publish UI package
        if: ${{ steps.release.outputs['packages/ui--release_created'] == 'true' }}
        run: pnpm --filter @ponti-studios/ui publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Verify published package
        if: ${{ steps.release.outputs['packages/ui--release_created'] == 'true' }}
        run: |
          VERSION="$(node -p 'require("./packages/ui/package.json").version')"
          test "$(npm view "@ponti-studios/ui@$VERSION" version --registry=https://registry.npmjs.org)" = "$VERSION"
