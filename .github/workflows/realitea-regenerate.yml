name: RealiTea Regenerate

on:
  workflow_dispatch:
    inputs:
      daysAhead:
        description: "Number of days ahead to regenerate (default: 7, only used when no future scheduled puzzles exist)"
        required: false
        default: "7"
        type: string

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          cache: "pnpm"

      - name: install-dependencies
        run: pnpm install --frozen-lockfile --filter @pontistudios/labyrinth...

      - name: install-db-dependencies
        run: pnpm install --frozen-lockfile --filter @pontistudios/db...

      - name: run-db-migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @pontistudios/db db:migrate

      - name: regenerate-future-puzzles
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: pnpm --filter @pontistudios/labyrinth realitea:reconcile -- --force --days-ahead=${{ github.event.inputs.daysAhead }}

      - name: health-check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @pontistudios/labyrinth exec tsx scripts/realitea-health-check.ts
