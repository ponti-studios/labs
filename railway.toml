# Railway Project Configuration
# Project ID: 5d298fa6-f823-4774-91ea-1c3a67e483c6

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/dumphim/Dockerfile"

[deploy]
startCommand = "./start.sh"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "dumphim"

[services.envs]
NODE_ENV = "production"
PORT = "3000"

[services.volumes]
mountPath = "/app/public/uploads"
name = "uploads"
size = "5Gi"

[environments.production]
name = "production"

[environments.production.deploy]
startCommand = "pnpm start"

[environments.production.envs]
NODE_ENV = "production"