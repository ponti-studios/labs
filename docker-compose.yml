version: '3.8'

services:
  hominem-mysql:
    build:
      context: ./docker/mysql
      dockerfile: Dockerfile
    image: pontistudios/mysql:latest
    container_name: hominem-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: labs_password
      MYSQL_DATABASE: labs
      MYSQL_USER: labs
      MYSQL_PASSWORD: labs_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hackefeller-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-plabs_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s


  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    container_name: hackefeller-mysqld-exporter
    depends_on:
      hominem-mysql:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "labs:labs_password@tcp(hominem-mysql:3306)/"
    ports:
      - "9104:9104"    # Prometheus scrape port
    networks:
      - hackefeller-network

  redis:
    image: redis:7-alpine
    container_name: hackefeller-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis_password
    networks:
      - hackefeller-network

  # Optional: Redis Commander for web-based Redis management
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: labs-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_password
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - hackefeller-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  hackefeller-network:
    driver: bridge 
