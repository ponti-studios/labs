<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Google Maps Explorer - Search locations and get directions with this interactive map tool" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="robots" content="index, follow" />

    <title>Google Maps Explorer</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>" />

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts: Inter and EB Garamond -->
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- Critical CSS -->
    <style type="text/css">
      #map-canvas {
        width: 100%;
        height: 550px;
        min-height: 300px;
      }
      /* Improve loading experience */
      .hidden {
        display: none;
      }
      .loading-container {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        background-color: #f9fafb;
      }
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(59, 130, 246, 0.2);
        border-radius: 50%;
        border-top-color: #3b82f6;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>

    <!-- Defer loading of scripts -->
    <script type="text/javascript" src="https://maps.googleapis.com/maps/api/js?key=API_KEY" defer></script>
    <script src="./main.ts" type="module"></script>
  </head>

  <body class="bg-gray-100 min-h-screen font-sans text-gray-800">
    <!-- Skip to content link for accessibility -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:p-4 focus:bg-blue-600 focus:text-white focus:z-50">
      Skip to main content
    </a>

    <header class="bg-blue-600 text-white p-6 shadow-md">
      <div class="container mx-auto max-w-5xl">
        <h1 class="text-3xl font-bold font-serif">Google Maps Explorer</h1>
        <p class="text-blue-100 mt-2">Search locations and get directions easily</p>
      </div>
    </header>

    <main id="main-content" class="container mx-auto p-6 max-w-5xl font-serif">
      <!-- Map section -->
      <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
        <div id="map-container" class="relative">
          <!-- Loading spinner shown before map loads -->
          <div id="map-loading" class="loading-container" style="height: 550px;">
            <div class="loading-spinner"></div>
          </div>

          <!-- Actual map canvas, initially hidden -->
          <div id="map-canvas" class="rounded-lg overflow-hidden border border-gray-300 shadow-inner hidden"></div>
        </div>
      </div>

      <!-- Forms section -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8" role="region" aria-label="Location and Direction Tools">

        <!-- Location Search Form -->
        <div class="bg-white rounded-lg shadow-lg p-6">
          <h2 class="text-xl font-semibold mb-4 text-blue-700 font-serif">Search Location</h2>
          <form id="locationForm" class="space-y-4">
            <div>
              <label for="location" class="block text-sm font-medium text-gray-700 mb-1">Enter Location</label>
              <div class="flex">
                <input
                  type="text"
                  name="location"
                  id="location"
                  placeholder="e.g. New York, NY"
                  class="flex-1 px-4 py-2 border border-gray-300 rounded-l-md focus:ring-blue-500 focus:border-blue-500 focus:outline-none"
                  aria-required="true"
                  autocomplete="street-address"
                />
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-r-md hover:bg-blue-700 transition focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                  <span class="sr-only">Search for</span>
                  Search
                </button>
              </div>
            </div>
          </form>
        </div>

        <!-- Directions Form -->
        <div class="bg-white rounded-lg shadow-lg p-6">
          <h2 class="text-xl font-semibold mb-4 text-blue-700 font-serif">Get Directions</h2>
          <form id="directionsForm" class="space-y-4">
            <div>
              <label for="origin" class="block text-sm font-medium text-gray-700 mb-1">Starting Point</label>
              <input
                type="text"
                name="origin"
                id="origin"
                placeholder="e.g. Central Park, NY"
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 focus:outline-none"
                aria-required="true"
                autocomplete="street-address"
              />
            </div>
            <div>
              <label for="destination" class="block text-sm font-medium text-gray-700 mb-1">Destination</label>
              <input
                type="text"
                name="destination"
                id="destination"
                placeholder="e.g. Times Square, NY"
                class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 focus:outline-none"
                aria-required="true"
                autocomplete="street-address"
              />
            </div>
            <button
              type="submit"
              class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50"
            >
              Get Directions
            </button>
          </form>
        </div>
      </div>


      <!-- Directions List -->
      <div class="mt-8 bg-white rounded-lg shadow-lg p-6 hidden" id="directionsContainer" role="region" aria-label="Directions Results">
        <h2 class="text-xl font-semibold mb-4 text-blue-700 font-serif">Directions</h2>
        <div id="directions-summary" class="mb-4"></div>
        <ul id="directions" class="space-y-2 list-decimal pl-5">
          <!-- Direction steps will be inserted here by JavaScript -->
        </ul>
      </div>
    </main>

    <footer class="bg-gray-800 text-white p-6 mt-12">
      <div class="container mx-auto max-w-5xl text-center">
        <p>&copy; <span id="current-year">2023</span> Google Maps Explorer</p>
        <p class="text-gray-400 text-sm mt-2">
          This is a demonstration project using the Google Maps API.
          <br class="hidden sm:block">
          Not affiliated with Google Inc.
        </p>
      </div>
    </footer>

    <!-- Update year automatically -->
    <script>
      document.getElementById("current-year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
