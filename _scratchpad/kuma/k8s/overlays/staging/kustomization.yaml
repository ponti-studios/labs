apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

configMapGenerator:
  - name: kuma-config
    behavior: merge
    literals:
      - LOG_LEVEL=debug
      - ENVIRONMENT=staging

replicas:
  - name: kuma
    count: 1

images:
  - name: kuma-kuma
    newName: ghcr.io/charlesponti/kuma
    newTag: latest
