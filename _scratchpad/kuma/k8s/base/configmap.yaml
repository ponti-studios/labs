apiVersion: v1
kind: ConfigMap
metadata:
  name: kuma-config
  labels:
    app: kuma
data:
  # Database configuration
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "hominem"
  DB_USER: "mcp_server"
  
  # Server configuration
  PORT: "8080"
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  
  # Connection pool settings
  DB_MAX_CONNS: "25"
  DB_MIN_CONNS: "5"
  DB_MAX_CONN_LIFETIME: "1h"
  DB_MAX_CONN_IDLE_TIME: "30m"
