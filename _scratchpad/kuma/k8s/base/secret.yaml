apiVersion: v1
kind: Secret
metadata:
  name: kuma-secrets
  labels:
    app: kuma
type: Opaque
stringData:
  # Database password - base64 encoded
  # Generate with: echo -n 'your-password' | base64
  DB_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_PASSWORD"
  
  # JWT Secret - base64 encoded
  # Generate with: openssl rand -base64 32
  JWT_SECRET: "REPLACE_WITH_BASE64_ENCODED_JWT_SECRET"
  
  # Database URL (alternative to individual DB_* vars)
  # Format: postgresql://user:password@host:port/database
  DATABASE_URL: "REPLACE_WITH_BASE64_ENCODED_DATABASE_URL"
