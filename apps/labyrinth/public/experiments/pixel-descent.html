<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Descent — NYC Subway 1930s</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--dark:#141413;--light:#faf9f5;--mid:#b0aea5;--lgray:#e8e6dc;--orange:#d97757;--blue:#6a9bcc;--green:#788c5d;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,var(--light) 0%,#f5f3ee 100%);min-height:100vh;color:var(--dark);}
.container{display:flex;min-height:100vh;padding:20px;gap:20px;}
.sidebar{width:300px;flex-shrink:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);padding:24px;border-radius:12px;box-shadow:0 10px 30px rgba(20,20,19,.1);overflow-y:auto;}
.sidebar h1{font-family:'Lora',serif;font-size:22px;font-weight:500;margin-bottom:6px;}
.sidebar .subtitle{color:var(--mid);font-size:13px;margin-bottom:28px;line-height:1.5;}
.control-section{margin-bottom:28px;}
.control-section h3{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.control-section h3::before{content:'•';color:var(--orange);font-weight:bold;}
.seed-input{width:100%;background:var(--light);padding:10px;border-radius:8px;font-family:'Courier New',monospace;font-size:13px;margin-bottom:10px;border:1px solid var(--lgray);text-align:center;outline:none;}
.seed-input:focus{border-color:var(--orange);}
.seed-controls{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;}
.control-group{margin-bottom:18px;}
.control-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;}
.slider-container{display:flex;align-items:center;gap:10px;}
.slider-container input[type=range]{flex:1;height:4px;background:var(--lgray);border-radius:2px;outline:none;-webkit-appearance:none;}
.slider-container input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;background:var(--orange);border-radius:50%;cursor:pointer;}
.value-display{font-family:'Courier New',monospace;font-size:11px;color:var(--mid);min-width:52px;text-align:right;}
.btn{width:100%;padding:9px;border-radius:8px;border:1.5px solid var(--lgray);background:white;cursor:pointer;font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;transition:all .15s;}
.btn:hover{border-color:var(--orange);color:var(--orange);}
.btn-primary{background:var(--orange);color:white;border-color:var(--orange);margin-bottom:8px;}
.btn-primary:hover{background:#c86641;color:white;}
.button-row{display:flex;flex-direction:column;gap:7px;}
.canvas-area{flex:1;display:flex;align-items:flex-start;justify-content:center;}
#canvas-container canvas{border-radius:10px;box-shadow:0 8px 32px rgba(20,20,19,.15);}
</style>
</head>
<body>
<div class="container">
<div class="sidebar">
  <h1>Pixel Descent</h1>
  <p class="subtitle">A million souls in fedoras and briefcases pour into the IRT, seen from a drone eye above — 1930s 8-bit isometric NYC.</p>

  <div class="control-section">
    <h3>Seed</h3>
    <input class="seed-input" type="number" id="seed-input" value="19301" min="1">
    <div class="seed-controls">
      <button class="btn" onclick="previousSeed()">← Prev</button>
      <button class="btn" onclick="nextSeed()">Next →</button>
      <button class="btn" onclick="randomSeedAndUpdate()">Random</button>
      <button class="btn" onclick="updateSeed()">Jump</button>
    </div>
  </div>

  <div class="control-section">
    <h3>Parameters</h3>
    <div class="control-group">
      <label>Crowd Density</label>
      <div class="slider-container">
        <input type="range" id="crowdDensity" min="200" max="1800" step="50" value="900" oninput="updateParam('crowdDensity',+this.value)">
        <span class="value-display" id="crowdDensity-value">900</span>
      </div>
    </div>
    <div class="control-group">
      <label>Walk Speed</label>
      <div class="slider-container">
        <input type="range" id="walkSpeed" min="0.3" max="3.0" step="0.1" value="1.0" oninput="updateParam('walkSpeed',+this.value)">
        <span class="value-display" id="walkSpeed-value">1.0</span>
      </div>
    </div>
    <div class="control-group">
      <label>Pixel Scale</label>
      <div class="slider-container">
        <input type="range" id="pixelScale" min="2" max="6" step="1" value="4" oninput="updateParam('pixelScale',+this.value)">
        <span class="value-display" id="pixelScale-value">4</span>
      </div>
    </div>
    <div class="control-group">
      <label>Funnel Spread</label>
      <div class="slider-container">
        <input type="range" id="funnelSpread" min="0.2" max="1.0" step="0.05" value="0.6" oninput="updateParam('funnelSpread',+this.value)">
        <span class="value-display" id="funnelSpread-value">0.6</span>
      </div>
    </div>
    <div class="control-group">
      <label>Era Grit (noise)</label>
      <div class="slider-container">
        <input type="range" id="eraGrit" min="0" max="1" step="0.05" value="0.35" oninput="updateParam('eraGrit',+this.value)">
        <span class="value-display" id="eraGrit-value">0.35</span>
      </div>
    </div>
  </div>

  <div class="control-section">
    <h3>Actions</h3>
    <div class="button-row">
      <button class="btn btn-primary" onclick="initializeSystem()">Regenerate</button>
      <button class="btn" onclick="resetParameters()">Reset</button>
      <button class="btn" onclick="downloadPNG()">Download PNG</button>
    </div>
  </div>
</div>

<div class="canvas-area">
  <div id="canvas-container"></div>
</div>
</div>

<script>
let params = {
  seed: 19301,
  crowdDensity: 900,
  walkSpeed: 1.0,
  pixelScale: 4,
  funnelSpread: 0.6,
  eraGrit: 0.35
};
let defaultParams = {...params};

const COAT_COLORS = [
  [60,45,30],[80,65,45],[45,35,22],[95,75,50],[35,28,18],[110,88,60],[50,40,28],[70,55,38]
];
const HAT_COLORS = [
  [30,22,14],[50,40,28],[22,18,12],[40,32,22],[60,48,34]
];
const TROUSER_COLORS = [
  [28,22,14],[40,32,22],[20,16,10],[55,44,30]
];
const SKIN_TONES = [
  [210,175,140],[185,148,110],[230,195,160],[170,130,95],[200,162,125]
];
const BRIEFCASE_COLORS = [
  [100,70,35],[80,55,25],[60,42,20],[120,88,45]
];

let W = 900, H = 900;
let walkers = [];
let pg;

new p5(function(sk) {

  sk.setup = function() {
    let cnv = sk.createCanvas(W, H);
    cnv.parent('canvas-container');
    sk.colorMode(sk.RGB);
    initializeSystem();
  };

  sk.draw = function() {
    sk.image(pg, 0, 0);

    let ps = params.pixelScale;
    let speed = params.walkSpeed;

    walkers.sort((a,b) => a.sy - b.sy);

    for (let w of walkers) {
      w.update(speed);
      w.drawSprite(sk, ps);
    }

    sk.randomSeed(sk.frameCount * 7 + params.seed);
    if (walkers.length < params.crowdDensity && sk.random() < 0.35) {
      spawnWalker(sk);
    }

    drawEntranceOverlay(sk);
  };

  function initializeSystem() {
    sk.randomSeed(params.seed);
    sk.noiseSeed(params.seed);
    walkers = [];
    pg = sk.createGraphics(W, H);
    drawStaticScene(pg);

    for (let i = 0; i < params.crowdDensity; i++) {
      spawnWalker(sk, true);
    }
  }
  window.initializeSystem = initializeSystem;

  function drawStaticScene(g) {
    g.background(38, 32, 24);

    g.noStroke();
    g.fill(52, 46, 36);
    g.rect(0, 0, W, H);

    let ps = params.pixelScale;
    g.stroke(45, 40, 30);
    g.strokeWeight(0.5);
    for (let x = 0; x < W; x += ps * 6) {
      g.line(x, 0, x, H);
    }
    for (let y = 0; y < H; y += ps * 6) {
      g.line(0, y, W, y);
    }

    let cx = W / 2, ey = H * 0.72;
    g.noStroke();
    g.fill(65, 58, 46);
    g.rect(cx - 160, ey - 20, 320, 80);

    g.stroke(55, 48, 36);
    g.strokeWeight(1);
    for (let x = cx - 160; x < cx + 160; x += 40) {
      g.line(x, ey - 20, x, ey + 60);
    }
    g.line(cx - 160, ey + 20, cx + 160, ey + 20);

    g.noStroke();
    g.fill(42, 38, 28);
    g.rect(cx - 70, ey - 60, 140, 50);
    g.stroke(60, 55, 42);
    g.strokeWeight(1.5);
    for (let x = cx - 70; x <= cx + 70; x += 14) {
      g.line(x, ey - 60, x, ey - 10);
    }
    for (let y = ey - 60; y <= ey - 10; y += 10) {
      g.line(cx - 70, y, cx + 70, y);
    }

    g.noStroke();
    g.fill(12, 10, 7);
    g.rect(cx - 58, ey - 8, 116, 60);

    g.fill(90, 82, 65);
    g.rect(cx - 68, ey - 14, 136, 12);
    g.fill(82, 74, 58);
    g.rect(cx - 72, ey - 4, 144, 10);
    g.fill(75, 68, 52);
    g.rect(cx - 78, ey + 4, 156, 10);

    g.stroke(45, 40, 30);
    g.strokeWeight(3);
    g.line(cx - 68, ey - 14, cx - 68, ey + 14);
    g.line(cx + 68, ey - 14, cx + 68, ey + 14);

    for (let rx = cx - 68; rx <= cx + 68; rx += 14) {
      g.stroke(55, 50, 38);
      g.strokeWeight(2);
      g.line(rx, ey - 14, rx, ey - 2);
    }

    drawGlobeLamp(g, cx - 85, ey - 20);
    drawGlobeLamp(g, cx + 85, ey - 20);

    g.noFill();
    g.stroke(30, 26, 18);
    g.strokeWeight(1);
  }

  function drawGlobeLamp(g, x, y) {
    g.stroke(60, 52, 38);
    g.strokeWeight(3);
    g.line(x, y + 30, x, y);
    g.line(x, y, x + (x < W/2 ? 12 : -12), y - 16);
    g.noStroke();
    g.fill(220, 200, 140, 200);
    g.ellipse(x + (x < W/2 ? 12 : -12), y - 20, 14, 14);
    g.fill(255, 240, 180, 120);
    g.ellipse(x + (x < W/2 ? 12 : -12), y - 20, 10, 10);
  }

  function drawEntranceOverlay(sk) {
    let cx = W/2, ey = H * 0.72;
    sk.noStroke();
    sk.fill(12, 10, 7);
    sk.rect(cx - 58, ey - 8, 116, 48);
    sk.fill(90, 82, 65);
    sk.rect(cx - 68, ey - 14, 136, 8);
    sk.stroke(45, 40, 30);
    sk.strokeWeight(4);
    sk.line(cx - 68, ey - 14, cx - 68, ey + 14);
    sk.line(cx + 68, ey - 14, cx + 68, ey + 14);
    for (let rx = cx - 68; rx <= cx + 68; rx += 14) {
      sk.stroke(55, 50, 38);
      sk.strokeWeight(2);
      sk.line(rx, ey - 14, rx, ey - 2);
    }
    drawGlobeLamp(sk, W/2 - 85, H*0.72 - 20);
    drawGlobeLamp(sk, W/2 + 85, H*0.72 - 20);
  }

  function spawnWalker(sk, scatter) {
    let cx = W / 2;
    let entranceY = H * 0.72;
    let spread = params.funnelSpread;
    let x, y;

    if (scatter) {
      x = sk.random(80, W - 80);
      y = sk.random(60, H * 0.85);
    } else {
      x = cx + sk.random(-W * spread * 0.5, W * spread * 0.5);
      y = sk.random(-20, 60);
    }

    let coatC = COAT_COLORS[Math.floor(sk.random(COAT_COLORS.length))];
    let hatC = HAT_COLORS[Math.floor(sk.random(HAT_COLORS.length))];
    let trouserC = TROUSER_COLORS[Math.floor(sk.random(TROUSER_COLORS.length))];
    let skinC = SKIN_TONES[Math.floor(sk.random(SKIN_TONES.length))];
    let briefC = sk.random() < 0.7 ? BRIEFCASE_COLORS[Math.floor(sk.random(BRIEFCASE_COLORS.length))] : null;
    let phase = sk.random(0, Math.PI * 2);

    walkers.push(new Walker(x, y, cx, entranceY, coatC, hatC, trouserC, skinC, briefC, phase, sk));
  }

  class Walker {
    constructor(x, y, tx, ty, coat, hat, trouser, skin, brief, phase, sk) {
      this.x = x;
      this.y = y;
      this.tx = tx;
      this.ty = ty;
      this.coat = coat;
      this.hat = hat;
      this.trouser = trouser;
      this.skin = skin;
      this.brief = brief;
      this.phase = phase;
      this.alive = true;
      this.sy = y;
      this.drift = sk.random(-0.3, 0.3);
      this.noiseOff = sk.random(0, 1000);
    }

    update(speed) {
      let dx = this.tx - this.x;
      let dy = this.ty - this.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 8) {
        this.x = W/2 + (Math.random()-0.5) * W * params.funnelSpread * 0.5;
        this.y = Math.random() * -30 - 5;
        return;
      }

      let nx = dx / dist, ny = dy / dist;

      let noiseStrength = params.eraGrit * Math.min(1, dist / 200);
      let angle = (noise(this.noiseOff + sk.frameCount * 0.004) - 0.5) * Math.PI * noiseStrength;
      let cnx = nx * Math.cos(angle) - ny * Math.sin(angle);
      let cny = nx * Math.sin(angle) + ny * Math.cos(angle);

      let s = speed * (0.8 + this.drift * 0.4);
      this.x += cnx * s;
      this.y += cny * s;
      this.sy = this.y;
      this.phase += 0.18 * speed;
      this.noiseOff += 0.002;
    }

    drawSprite(sk, ps) {
      let x = Math.floor(this.x);
      let y = Math.floor(this.y);
      let leg = Math.sin(this.phase) > 0 ? 1 : -1;

      const p = (col, row, r, g, b, a) => {
        sk.noStroke();
        sk.fill(r, g, b, a || 255);
        sk.rect(x + col * ps - ps * 2, y + row * ps, ps, ps);
      };

      let [cr, cg, cb] = this.coat;
      let [hr, hg, hb] = this.hat;
      let [tr, tg, tb] = this.trouser;
      let [sr, sg, sb] = this.skin;

      p(1,0, hr,hg,hb); p(2,0, hr,hg,hb); p(3,0, hr,hg,hb);
      p(1,1, hr+5,hg+4,hb+3); p(2,1, hr+5,hg+4,hb+3); p(3,1, hr+5,hg+4,hb+3);
      p(2,2, hr+8,hg+6,hb+4);
      p(1,3, sr,sg,sb); p(2,3, sr,sg,sb); p(3,3, sr,sg,sb);
      p(2,4, 20,16,10);
      p(0,4, cr,cg,cb); p(1,4, cr+5,cg+4,cb+3); p(2,4, cr+5,cg+4,cb+3); p(3,4, cr+5,cg+4,cb+3); p(4,4, cr,cg,cb);
      p(1,5, cr,cg,cb); p(2,5, cr+3,cg+2,cb+2); p(3,5, cr,cg,cb);
      p(1,6, cr,cg,cb); p(2,6, cr+3,cg+2,cb+2); p(3,6, cr,cg,cb);

      if (this.brief) {
        let [br, bg2, bb] = this.brief;
        p(4,5, br,bg2,bb);
        p(4,6, br-8,bg2-6,bb-4);
        p(4,4, 40,32,20);
      }

      p(1,7, tr,tg,tb); p(2,7, tr,tg,tb); p(3,7, tr,tg,tb);
      p(1,8, tr-5,tg-4,tb-3); p(2,8, tr-5,tg-4,tb-3); p(3,8, tr-5,tg-4,tb-3);

      let lOff = leg > 0 ? 1 : 0;
      p(1 + lOff, 9, 18,14,9);
      p(2 + (1 - lOff), 9, 22,18,12);

      sk.noStroke();
      sk.fill(20, 16, 10, 60);
      sk.ellipse(x + ps, y + ps * 9.5, ps * 4, ps * 1.5);
    }
  }

  function noise(t) {
    return sk.noise(t);
  }

  window.previousSeed = function() {
    params.seed = Math.max(1, params.seed - 1);
    updateSeedDisplay();
    initializeSystem();
  };
  window.nextSeed = function() {
    params.seed = params.seed + 1;
    updateSeedDisplay();
    initializeSystem();
  };
  window.randomSeedAndUpdate = function() {
    params.seed = Math.floor(Math.random() * 999999) + 1;
    updateSeedDisplay();
    initializeSystem();
  };
  window.updateSeed = function() {
    let v = parseInt(document.getElementById('seed-input').value);
    if (v > 0) { params.seed = v; initializeSystem(); }
    else updateSeedDisplay();
  };
  window.updateParam = function(name, val) {
    params[name] = val;
    document.getElementById(name + '-value').textContent = val;
    if (name === 'crowdDensity' || name === 'pixelScale' || name === 'funnelSpread') {
      initializeSystem();
    }
  };
  window.resetParameters = function() {
    params = {...defaultParams};
    document.getElementById('crowdDensity').value = params.crowdDensity;
    document.getElementById('crowdDensity-value').textContent = params.crowdDensity;
    document.getElementById('walkSpeed').value = params.walkSpeed;
    document.getElementById('walkSpeed-value').textContent = params.walkSpeed;
    document.getElementById('pixelScale').value = params.pixelScale;
    document.getElementById('pixelScale-value').textContent = params.pixelScale;
    document.getElementById('funnelSpread').value = params.funnelSpread;
    document.getElementById('funnelSpread-value').textContent = params.funnelSpread;
    document.getElementById('eraGrit').value = params.eraGrit;
    document.getElementById('eraGrit-value').textContent = params.eraGrit;
    updateSeedDisplay();
    initializeSystem();
  };
  window.downloadPNG = function() {
    sk.saveCanvas('pixel_descent', 'png');
  };

  function updateSeedDisplay() {
    document.getElementById('seed-input').value = params.seed;
  }

  window.addEventListener('load', updateSeedDisplay);
});
</script>
</body>
</html>
